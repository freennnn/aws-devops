apiVersion: v2
name: prometheus-monitoring
description: Prometheus monitoring stack for Kubernetes cluster
type: application
version: 1.0.0
appVersion: "2.45.0"

dependencies:
  - name: kube-prometheus
    version: "11.2.16"
    repository: https://charts.bitnami.com/bitnami
    alias: prometheus

  - name: node-exporter
    version: "4.5.17" 
    repository: https://charts.bitnami.com/bitnami
    condition: nodeExporter.enabled

keywords:
  - prometheus
  - monitoring
  - observability
  - metrics

home: https://prometheus.io/
sources:
  - https://github.com/prometheus/prometheus
  - https://github.com/bitnami/charts/tree/main/bitnami/kube-prometheus

maintainers:
  - name: DevOps Team
    email: devops@company.com 