# SonarQube Configuration for Flask Hello World Application

# Project Information
sonar.projectKey=flask-hello-world
sonar.projectName=Flask Hello World
sonar.projectVersion=1.0

# Source Configuration
sonar.sources=flask-hello-world
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/venv/**,**/__pycache__/**,**/node_modules/**,**/*.pyc,**/migrations/**

# Test Configuration
sonar.tests=flask-hello-world/tests
sonar.test.inclusions=**/*test*.py
sonar.test.exclusions=**/venv/**,**/__pycache__/**

# Python Specific Configuration
sonar.python.coverage.reportPaths=flask-hello-world/coverage.xml
sonar.python.xunit.reportPath=flask-hello-world/test-results.xml

# Language Configuration
sonar.language=py

# Quality Gate Configuration
sonar.qualitygate.wait=true

# Coverage Configuration
sonar.coverage.exclusions=**/tests/**,**/venv/**,**/__pycache__/**

# Duplication Configuration
sonar.cpd.exclusions=**/tests/**

# Security Configuration
sonar.security.hotspots.exclude=false

# Additional Python Settings
sonar.python.bandit.reportPaths=flask-hello-world/bandit-report.json
sonar.python.flake8.reportPaths=flask-hello-world/flake8-report.txt

# Docker Configuration (for containerized SonarQube scanner)
sonar.scanner.force-deprecated-java-version=false 